name: Test

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.7.17", "3.11.9"]

    steps:
      - uses: actions/checkout@v4

      # Install pyenv and build dependencies
      - name: Install pyenv and build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential zlib1g-dev libssl-dev libbz2-dev \
            libreadline-dev libsqlite3-dev libffi-dev liblzma-dev \
            libncurses5-dev libncursesw5-dev libgdbm-dev uuid-dev \
            curl cmake git wget

          curl https://pyenv.run | bash

      # Install Python versions
      - name: Install Python
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"

          pyenv install -s ${{ matrix.python-version }}

      # Clone and build grug-tests
      - name: Build grug-tests
        run: |
          git clone https://github.com/grug-lang/grug-tests
          cd grug-tests
          git checkout development
          cmake -S . -B build
          cmake --build build

      # Build corpus
      - name: Build corpus
        run: |
          mkdir -p corpus

          # TODO: Why not just collect the regular .grug files, rather than the applied.grug files?
          # Collect all .grug files from tests/*/*/*.grug
          find grug-tests/tests -path "*/results/applied.grug" -prune -o \
            -path "grug-tests/tests/*/*/*.grug" -type f -print | while read f; do
              # flatten path into unique filename
              flat_name=$(echo "$f" | sed 's|/|_|g')
              cp "$f" "corpus/$flat_name"
            done

          echo "Corpus size:"
          ls corpus | wc -l

      # Run tests
      - name: Run Pyright and Tests (Python ${{ matrix.python-version }})
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"

          pyenv global ${{ matrix.python-version }}
          python --version

          pip install --upgrade pip --user
          pip install pyright pytest coverage --user

          if [[ "${{ matrix.python-version }}" == "3.7.17" ]]; then
            pip install tomli importlib-metadata --user
          fi

          pip install -e .[dev]

          PY_MAJOR_MINOR=$(python - <<'EOF'
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )

          pyright --pythonversion "$PY_MAJOR_MINOR"

          python tests.py
          coverage run -m pytest --grug-tests-path=./grug-tests -s -v
          coverage report -m

      - name: Generate Coverage Badge
        if: matrix.python-version == '3.11.9'
        run: |
          export PYENV_ROOT="$HOME/.pyenv"
          export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$HOME/.local/bin:$PATH"
          pyenv global 3.11.9

          pip install -U coverage-badge --user

          # Generate badge
          coverage-badge -o .github/workflows/coverage.svg

          # Configure Git for committing changes
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Commit & push only if the badge changed
          git add .github/workflows/coverage.svg
          if ! git diff --cached --quiet; then
            git commit -m "Update coverage badge"
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes to coverage.svg"
          fi
