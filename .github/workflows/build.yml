name: Test

on:
  push:
  pull_request:
  schedule:
    - cron: "0 2 * * *" # nightly at 02:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.7", "3.11"]

    steps:
      - uses: actions/checkout@v4

      # ✅ Setup Python properly
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # System deps (for grug-tests build)
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake afl++

      # Clone and build grug-tests
      - name: Build grug-tests
        run: |
          git clone https://github.com/grug-lang/grug-tests
          cd grug-tests
          git checkout development
          cmake -S . -B build
          cmake --build build

      # Build corpus
      - name: Build corpus
        run: |
          mkdir -p corpus

          # Collect all .grug files from tests/*/*/*.grug
          find grug-tests/tests -path "*/results/applied.grug" -prune -o \
            -path "grug-tests/tests/*/*/*.grug" -type f -print | while read f; do
              # flatten path into unique filename
              flat_name=$(echo "$f" | sed 's|/|_|g')
              cp "$f" "corpus/$flat_name"
            done

          echo "Corpus size:"
          ls corpus | wc -l

      # Install Python deps
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyright pytest coverage
          pip install -e .[dev]

          if [[ "${{ matrix.python-version }}" == "3.7" ]]; then
            pip install tomli importlib-metadata
          fi

      # Typecheck + Test
      - name: Run Pyright and Tests
        run: |
          PY_MAJOR_MINOR=$(python - <<EOF
          import sys
          print(f"{sys.version_info.major}.{sys.version_info.minor}")
          EOF
          )

          pyright --pythonversion "$PY_MAJOR_MINOR"

          python tests.py
          coverage run -m pytest --grug-tests-path=./grug-tests -s -v
          coverage report -m

      # Generate badge
      - name: Coverage Badge
        if: matrix.python-version == '3.11'
        uses: tj-actions/coverage-badge-py@v2
